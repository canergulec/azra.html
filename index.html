<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azra - Özür Dilerim</title>
    <style>
        /* Orijinal iOS Sistem Fontları ve Arka Plan */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, sans-serif;
            /* Açık, modern ve çok hafif pembemsi iOS arkaplanı */
            background: linear-gradient(135deg, #FFF0F5, #FFE4E1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #1C1C1E;
        }

        /* iOS Bildirim/Kart Tasarımı */
        .ios-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            width: 320px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 10;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            font-weight: 400;
            color: #3A3A3C;
            line-height: 1.4;
            margin-bottom: 24px;
            letter-spacing: -0.2px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* iOS Buton Tasarımları */
        button {
            font-family: inherit;
            font-size: 17px;
            font-weight: 600;
            border-radius: 14px;
            padding: 14px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
            width: 100%;
            letter-spacing: -0.3px;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-yes {
            background-color: #FF2D55; /* Orijinal iOS Sistem Pembesi */
            color: #FFFFFF;
        }

        .btn-no {
            background-color: #E5E5EA; /* iOS Sistem Grisi */
            color: #FF2D55;
        }

        #success-message {
            display: none;
        }

        #success-message h1 {
            color: #FF2D55;
        }
    </style>
</head>
<body>

    <!-- İlk Ekran: Özür Mesajı ve Butonlar -->
    <div class="ios-card" id="main-content">
        <h1>Özür Dilerim Azra</h1>
        <p>Yaşananlar için gerçekten üzgünüm. Seni kırmak istemezdim, hatamın farkındayım. Lütfen bu tatsızlığı geride bırakmamıza izin ver.</p>
        <p style="font-weight: 600; color: #000;">Beni affediyor musun?</p>
        
        <div class="btn-container" id="btn-container">
            <button class="btn-yes" onclick="affetti()">Evet</button>
            <!-- Telefondan girebileceği ihtimaline karşı ontouchstart da eklendi -->
            <button class="btn-no" id="btnNo" onmouseover="kac()" ontouchstart="kac()">Hayır</button>
        </div>
    </div>

    <!-- İkinci Ekran: Başarı Mesajı -->
    <div class="ios-card" id="success-message">
        <h1>Teşekkür Ederim</h1>
        <p>Anlayışın için çok sağ ol. Bunu telafi edeceğime söz veriyorum. 😊</p>
    </div>

    <script>
        const btnNo = document.getElementById('btnNo');

        function kac() {
            // Kaçma efekti için buton serbest bırakılır
            btnNo.style.position = 'fixed';
            
            // Ekran dışına çıkmaması için güvenli alan hesaplaması
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            // iOS tarzı pürüzsüz kayma animasyonu
            btnNo.style.transition = "left 0.2s ease-out, top 0.2s ease-out";
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
            
            // Butonun genişliğini ekrandan bağımsız sabitler
            btnNo.style.width = '150px';
        }

        function affetti() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            btnNo.style.display = 'none';
        }
    </script>
</body>
</html>
