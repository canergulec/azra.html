<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azra - Özür Dilerim</title>
    <style>
        /* Orijinal iOS Sistem Fontları */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, sans-serif;
            /* Aşk Teması: Daha sıcak, romantik ve pembe/kırmızı degrade arkaplan */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #1C1C1E;
            position: relative;
        }

        /* Uçuşan Kalpler İçin CSS Animasyonu */
        .heart-icon {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            z-index: 1;
            animation: floatUp linear infinite;
            opacity: 0.6;
            filter: drop-shadow(0 2px 4px rgba(255,45,85,0.3));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-110vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        /* iOS Bildirim/Kart Tasarımı */
        .ios-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            width: 320px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            z-index: 10;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            color: #FF2D55; /* Başlık Rengi */
        }

        p {
            font-size: 15px;
            font-weight: 400;
            color: #3A3A3C;
            line-height: 1.5;
            margin-bottom: 24px;
            letter-spacing: -0.2px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* iOS Buton Tasarımları */
        button {
            font-family: inherit;
            font-size: 17px;
            font-weight: 600;
            border-radius: 14px;
            padding: 14px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
            width: 100%;
            letter-spacing: -0.3px;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-yes {
            background-color: #FF2D55;
            color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(255, 45, 85, 0.3);
        }

        .btn-no {
            background-color: rgba(255, 45, 85, 0.1);
            color: #FF2D55;
        }

        #success-message {
            display: none;
        }

    </style>
</head>
<body>

    <!-- İlk Ekran: Özür Mesajı ve Butonlar -->
    <div class="ios-card" id="main-content">
        <h1>Özür Dilerim Azra</h1>
        <p>Yaşananlar için gerçekten üzgünüm. Seni kırmak istemezdim, hatamın farkındayım. Lütfen bu tatsızlığı geride bırakmamıza izin ver.</p>
        <p style="font-weight: 600; color: #1C1C1E;">Beni affediyor musun?</p>
        
        <div class="btn-container" id="btn-container">
            <button class="btn-yes" onclick="affetti()">Evet</button>
            <button class="btn-no" id="btnNo" onmouseover="kac()" ontouchstart="kac()">Hayır</button>
        </div>
    </div>

    <!-- İkinci Ekran: Başarı Mesajı -->
    <div class="ios-card" id="success-message">
        <h1>Teşekkür Ederim ❤️</h1>
        <p>Anlayışın için çok sağ ol. Bunu telafi edeceğime söz veriyorum. Seni çok seviyorum! 😊</p>
    </div>

    <script>
        // --- Arka Planda Uçuşan Kalpler Algoritması ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-icon');
            
            // Rastgele kalp emojileri
            const hearts = ['❤️', '💖', '💕', '💗', '💘'];
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            
            // Ekranın rastgele bir yatay konumundan başlasın
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Rastgele uçuş süresi (3 ile 6 saniye arası)
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            
            // Rastgele boyut
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            
            document.body.appendChild(heart);
            
            // Animasyon bitince elementi temizle
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Her 300 milisaniyede bir yeni kalp oluştur
        setInterval(createHeart, 300);

        // --- Kaçan "Hayır" Butonu Algoritması ---
        const btnNo = document.getElementById('btnNo');

        function kac() {
            btnNo.style.position = 'fixed';
            
            // Güvenli alan (buton ekran dışına taşmasın diye)
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            btnNo.style.transition = "left 0.2s ease-out, top 0.2s ease-out";
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
            btnNo.style.width = '150px';
        }

        // --- "Evet" Butonuna Tıklanınca ---
        function affetti() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            btnNo.style.display = 'none'; // Kaçan butonu tamamen gizle
        }
    </script>
</body>
</html>
