<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Annem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            background-color: #d81b60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
        }

        .btn:hover {
            background-color: #ad1457;
            transform: translateY(-2px);
        }

        #message {
            display: none;
            margin-top: 20px;
            font-weight: 600;
            color: #c2185b;
            font-size: 1.2rem;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Uçuşan Kalpler için CSS */
        .heart {
            position: absolute;
            color: #ff4081;
            font-size: 1.5rem;
            animation: floatUp 4s linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Anneler Günün Kutlu Olsun!</h1>
        <p>Karşılıksız sevgin, sonsuz sabrın ve her zaman yanımda olduğun için teşekkür ederim. Sen dünyanın en harika annesisin!</p>
        <button class="btn" onclick="showMessage()">Sana Özel Bir Mesaj</button>
        <div id="message">İyi ki varsın, seni çok seviyorum! ❤️</div>
    </div>

    <script>
        function showMessage() {
            // Mesajı göster
            document.getElementById("message").style.display = "block";
            
            // Kalp yağmuru başlat
            for(let i = 0; i < 30; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            
            // Ekranın rastgele bir yerinden başlat
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 2 + 3 + "s"; // 3 ile 5 saniye arası
            
            document.body.appendChild(heart);

            // Animasyon bitince kalbi DOM'dan temizle
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>

</body>
</html>
