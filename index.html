<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azra - Özür Dilerim</title>
    <!-- Modern ve şık bir görünüm için Google Fonts'tan Poppins fontunu ekliyoruz -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Açık pembe tonlarında modern bir degrade arka plan */
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: #590d22;
        }

        .card {
            /* Yarı saydam beyaz arka plan ile hafif cam efekti (glassmorphism) */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(255, 143, 163, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 15px;
            color: #ff4d6d;
        }

        p {
            font-weight: 300;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #800f2f;
        }

        .buttons {
            position: relative;
            height: 50px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-yes {
            background-color: #ff4d6d;
            color: #fff;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
        }

        .btn-yes:hover {
            background-color: #c9184a;
            transform: translateY(-2px);
        }

        .btn-no {
            background-color: #fff0f3;
            color: #ff4d6d;
            border: 2px solid #ff4d6d;
        }

        #success-message {
            display: none;
        }

        #success-message h1 {
            color: #c9184a;
        }

        #success-message p {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <!-- İlk Ekran: Özür Mesajı ve Butonlar -->
    <div class="card" id="main-content">
        <h1>Özür Dilerim Azra</h1>
        <p>Yaşananlar için gerçekten üzgünüm. Seni kırmak istemezdim, hatamın farkındayım. Lütfen bu tatsızlığı geride bırakmamıza izin ver.</p>
        <p style="font-weight: 600;">Beni affediyor musun?</p>
        <div class="buttons">
            <button class="btn-yes" onclick="affetti()">Evet</button>
            <button class="btn-no" id="btnNo" onmouseover="kac()" onclick="kac()">Hayır</button>
        </div>
    </div>

    <!-- İkinci Ekran: Evet'e Tıklandığında Çıkacak Mesaj -->
    <div class="card" id="success-message">
        <h1>Teşekkür Ederim</h1>
        <p>Anlayışın için çok sağ ol. Bunu telafi edeceğime söz veriyorum. 😊</p>
    </div>

    <script>
        const btnNo = document.getElementById('btnNo');

        // 'Hayır' butonunu ekranda rastgele kaçıran fonksiyon
        function kac() {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 40);
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = `${x}px`;
            btnNo.style.top = `${y}px`;
        }

        // 'Evet' butonuna tıklandığında ekranı değiştiren fonksiyon
        function affetti() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            
            // Eğer buton ekranda bir yere kaçtıysa gizle
            btnNo.style.display = 'none';
        }
    </script>
</body>
</html>
